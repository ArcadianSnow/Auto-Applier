[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "auto-applier"
version = "0.1.0"
description = "Automated LinkedIn job application tool with skills gap tracking"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "playwright>=1.40",
    "playwright-stealth>=1.0.6",
    "pdfplumber>=0.10",
    "python-docx>=1.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
auto-applier = "auto_applier.main:cli"

[tool.setuptools.packages.find]
include = ["auto_applier*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
