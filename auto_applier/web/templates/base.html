<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Auto Applier v3{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231f4f8f'/%3E%3Cpath d='M9 23 L16 8 L23 23 M12 18.5 H20' stroke='white' stroke-width='2.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true">A</span>
        <span class="brand-name">Auto Applier <span class="brand-ver">v3</span></span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="/">Dashboard</a>
        <a href="/reconcile">Skills</a>
        <a href="/onboarding">Onboarding</a>
      </nav>
    </header>
    <main class="container">{% block content %}{% endblock %}</main>
    <footer class="footer">av3 {{ version }} &middot; local-first &middot; your data never leaves this machine unless you opt in</footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
